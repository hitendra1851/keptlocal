name: Email Daily Marketing Report

on:
  push:
    branches: [main]
    paths:
      - 'marketing/reports/**.md'

jobs:
  email-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send report email via Gmail SMTP
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM: "hitendra.patel2986@gmail.com"
        run: |
          python3 << 'PYEOF'
          import os, glob, smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          reports = sorted(glob.glob('marketing/reports/*.md'))
          if not reports:
              print("No reports found — skipping email.")
              exit(0)

          latest = reports[-1]
          date = os.path.basename(latest).replace('.md', '')
          with open(latest) as f:
              content = f.read()

          def md_to_html(text):
              lines = text.split('\n')
              html = []
              in_list = False
              for line in lines:
                  if line.startswith('# '):
                      if in_list: html.append('</ul>'); in_list = False
                      html.append(f'<h1 style="color:#1a3d2b;margin-bottom:4px">{line[2:]}</h1>')
                  elif line.startswith('## '):
                      if in_list: html.append('</ul>'); in_list = False
                      html.append(f'<h2 style="color:#1a3d2b;border-bottom:2px solid #e8e0d5;padding-bottom:4px;margin-top:28px">{line[3:]}</h2>')
                  elif line.startswith('### '):
                      if in_list: html.append('</ul>'); in_list = False
                      html.append(f'<h3 style="color:#2d5a3d;margin-bottom:4px">{line[4:]}</h3>')
                  elif line.startswith('- [ ] '):
                      if not in_list: html.append('<ul style="list-style:none;padding-left:0">'); in_list = True
                      html.append(f'<li style="padding:4px 0;color:#c0392b">&#9744; <strong>{line[6:]}</strong></li>')
                  elif line.startswith('- [x] ') or line.startswith('- [X] '):
                      if not in_list: html.append('<ul style="list-style:none;padding-left:0">'); in_list = True
                      html.append(f'<li style="padding:4px 0;color:#27ae60">&#9745; {line[6:]}</li>')
                  elif line.startswith('- '):
                      if not in_list: html.append('<ul style="padding-left:20px">'); in_list = True
                      html.append(f'<li style="padding:2px 0">{line[2:]}</li>')
                  elif line.startswith('|'):
                      if in_list: html.append('</ul>'); in_list = False
                      html.append(f'<code style="display:block;font-size:12px;background:#f5f5f5;padding:2px 6px">{line}</code>')
                  elif line.strip() == '---':
                      if in_list: html.append('</ul>'); in_list = False
                      html.append('<hr style="border:none;border-top:1px solid #e0e0e0;margin:16px 0">')
                  elif line.strip() == '':
                      if in_list: html.append('</ul>'); in_list = False
                  else:
                      if in_list: html.append('</ul>'); in_list = False
                      html.append(f'<p style="margin:6px 0;line-height:1.5">{line}</p>')
              if in_list:
                  html.append('</ul>')
              return '\n'.join(html)

          gmail_from = os.environ['GMAIL_FROM']
          recipient  = 'hitendra.patel2986@gmail.com'

          html_body = f"""<!DOCTYPE html>
<html><body style="margin:0;padding:0;background:#f9f7f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
<div style="max-width:680px;margin:32px auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08)">
  <div style="background:#1a3d2b;padding:24px 32px">
    <p style="color:#a8c5b2;margin:0;font-size:13px;letter-spacing:0.5px">KEPTLOCAL.COM</p>
    <h1 style="color:#fff;margin:4px 0 0;font-size:22px;font-weight:600">Marketing Report</h1>
    <p style="color:#a8c5b2;margin:4px 0 0;font-size:14px">{date}</p>
  </div>
  <div style="padding:24px 32px 32px">{md_to_html(content)}</div>
  <div style="background:#f9f7f4;padding:16px 32px;border-top:1px solid #eee">
    <p style="color:#999;font-size:12px;margin:0">
      Sent automatically by your keptlocal marketing agent &middot;
      <a href="https://github.com/hitendra1851/keptlocal/tree/main/marketing/reports" style="color:#1a3d2b">View all reports</a>
    </p>
  </div>
</div>
</body></html>"""

          msg = MIMEMultipart('alternative')
          msg['Subject'] = f'keptlocal Marketing Report — {date}'
          msg['From']    = f'keptlocal Marketing <{gmail_from}>'
          msg['To']      = recipient
          msg.attach(MIMEText(content, 'plain'))
          msg.attach(MIMEText(html_body, 'html'))

          with smtplib.SMTP('smtp.gmail.com', 587) as smtp:
              smtp.ehlo()
              smtp.starttls()
              smtp.login(gmail_from, os.environ['GMAIL_APP_PASSWORD'])
              smtp.sendmail(gmail_from, recipient, msg.as_string())
              print(f'Email sent to {recipient}')
          PYEOF
