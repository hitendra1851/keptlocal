name: Deploy to AWS Amplify

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'amplify.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Create deployment zip
        run: cd dist && zip -r ../site.zip . && cd .. && echo "Zip: $(du -sh site.zip | cut -f1)"

      - name: Deploy to AWS Amplify
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          APP_ID="d1u3vfqwnwnnqk"
          BRANCH="main"

          # Create deployment slot — returns jobId + pre-signed S3 upload URL
          DEPLOYMENT=$(aws amplify create-deployment \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH" \
            --output json)

          JOB_ID=$(echo "$DEPLOYMENT" | jq -r '.jobId')
          UPLOAD_URL=$(echo "$DEPLOYMENT" | jq -r '.zipUploadUrl')
          echo "Job ID: $JOB_ID"

          # Upload zip to pre-signed URL (no auth header — it's already signed)
          curl --silent --fail -T site.zip "$UPLOAD_URL"

          # Start the deployment
          aws amplify start-deployment \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH" \
            --job-id "$JOB_ID"

          # Poll every 30s, 15-minute ceiling
          for i in $(seq 1 30); do
            sleep 30
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name "$BRANCH" \
              --job-id "$JOB_ID" \
              --output json | jq -r '.job.summary.status')
            echo "  [$((i * 30))s] $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "Deployed: https://keptlocal.com"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Deployment $STATUS."
              exit 1
            fi
          done

          echo "Timed out — check Amplify console."
          exit 1
